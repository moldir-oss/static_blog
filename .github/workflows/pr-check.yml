name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.139.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Get Hugo modules
        run: hugo mod get -u

      - name: Install Node.js dependencies
        if: hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != ''
        run: npm ci

      - name: Validate hugo.toml
        run: |
          hugo config --environment production > /dev/null
          echo "✅ hugo.toml valide"

      - name: Build check
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify
          echo "✅ Build Hugo réussi"

      - name: Check front matter
        run: |
          errors=0
          for file in $(find content -name "*.md"); do
            if ! head -1 "$file" | grep -q "^---"; then
              echo "❌ Front matter manquant : $file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "✅ Front matter validé sur tous les articles"

      - name: Check for broken links (optional)
        if: false
        run: |
          npm install -g @markdown-link-check/markdown-link-check
          find content -name "*.md" -exec markdown-link-check {} \;
