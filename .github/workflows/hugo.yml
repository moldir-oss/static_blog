name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Job de build et test (s'exécute aussi sur PR)
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Get Hugo modules
        run: hugo mod get -u

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify

      - name: Check for broken links
        run: |
          # Vérifier que le build a bien généré des fichiers
          if [ ! -f ./public/index.html ]; then
            echo "❌ Erreur : index.html non généré"
            exit 1
          fi
          echo "✅ Build validé — $(find ./public -type f | wc -l) fichiers générés"

      - name: Create site zip
        if: github.event_name != 'pull_request'
        run: |
          cd public
          zip -r ../site.zip .
          cd ..
          ls -lh site.zip

      - name: Upload zip artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: hugo-site
          path: site.zip
          retention-days: 30
