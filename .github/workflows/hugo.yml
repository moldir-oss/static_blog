name: Build and Deploy Hugo Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.139.0"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Get Hugo modules
        run: hugo mod get -u

      - name: Install Node.js dependencies
        if: hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != ''
        run: npm ci

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify

      - name: Validate build
        run: |
          if [ ! -f ./public/index.html ]; then
            echo "❌ Error: index.html not generated"
            exit 1
          fi
          echo "✅ Build validated — $(find ./public -type f | wc -l) files generated"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Create site zip artifact
        run: |
          cd public
          zip -r ../site.zip .
          cd ..
          ls -lh site.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: hugo-site-zip
          path: site.zip
          retention-days: 30

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-netlify:
    name: Deploy to Netlify
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        id: check
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: echo "enabled=$([ -n \"$NETLIFY_AUTH_TOKEN\" ] && [ -n \"$NETLIFY_SITE_ID\" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Download artifact
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hugo-site-zip
          path: ./public

      - name: Unzip site
        if: steps.check.outputs.enabled == 'true'
        run: |
          cd public
          unzip -o site.zip
          rm site.zip

      - name: Deploy to Netlify
        if: steps.check.outputs.enabled == 'true'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./public
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        id: check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: echo "enabled=$([ -n \"$CLOUDFLARE_API_TOKEN\" ] && [ -n \"$CLOUDFLARE_ACCOUNT_ID\" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Download artifact
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hugo-site-zip
          path: ./public

      - name: Unzip site
        if: steps.check.outputs.enabled == 'true'
        run: |
          cd public
          unzip -o site.zip
          rm site.zip

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.enabled == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: ./public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

  deploy-vercel:
    name: Deploy to Vercel
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: echo "enabled=$([ -n \"$VERCEL_TOKEN\" ] && [ -n \"$VERCEL_ORG_ID\" ] && [ -n \"$VERCEL_PROJECT_ID\" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Download artifact
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hugo-site-zip
          path: ./public

      - name: Unzip site
        if: steps.check.outputs.enabled == 'true'
        run: |
          cd public
          unzip -o site.zip
          rm site.zip

      - name: Deploy to Vercel
        if: steps.check.outputs.enabled == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./public