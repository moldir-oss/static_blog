name: Build Hugo Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  HUGO_VERSION: "0.164.0"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Get Hugo modules
        run: hugo mod get -u

      - name: Install Node.js dependencies
        if: hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != ''
        run: npm ci

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify

      - name: Validate build
        run: |
          if [ ! -f ./public/index.html ]; then
            echo "❌ Error: index.html not generated"
            exit 1
          fi
          echo "✅ Build validated — $(find ./public -type f | wc -l) files generated"

      - name: Create site zip artifact
        run: |
          cd public
          zip -r ../site.zip .
          cd ..
          ls -lh site.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: hugo-site-zip
          path: site.zip
          retention-days: 30
