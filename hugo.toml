baseURL = "https://example.com"
relativeURLs = true
defaultContentLanguage = "fr"
title = "Dossier Licenciement"
theme = ["github.com/adityatelange/hugo-PaperMod"]

copyright = "© 2026 - Tous droits réservés"

[pagination]
  pagerSize = 5
  disableAliases = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

# Multilingue : Français par défaut, Anglais prêt
[languages]
  [languages.fr]
    locale = "fr-fr"
    label = "Français"
    weight = 1
    [[languages.fr.menu.main]]
      identifier = "fr-accueil"
      name = "Accueil"
      url = "/"
      weight = 10
    [[languages.fr.menu.main]]
      identifier = "fr-articles"
      name = "Articles"
      url = "/posts"
      weight = 20
    [[languages.fr.menu.main]]
      identifier = "fr-chronologie"
      name = "Chronologie"
      url = "/posts/chronologie"
      weight = 25
    [[languages.fr.menu.main]]
      identifier = "fr-archives"
      name = "Archives"
      url = "/archives"
      weight = 30
    [[languages.fr.menu.main]]
      identifier = "fr-recherche"
      name = "Recherche"
      url = "/search"
      weight = 40
    [[languages.fr.menu.main]]
      identifier = "fr-tags"
      name = "Tags"
      url = "/tags"
      weight = 50
  [languages.en]
    locale = "en-us"
    label = "English"
    weight = 2
    [[languages.en.menu.main]]
      identifier = "en-home"
      name = "Home"
      url = "/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "en-posts"
      name = "Posts"
      url = "/posts"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "en-timeline"
      name = "Timeline"
      url = "/posts/chronologie"
      weight = 25
    [[languages.en.menu.main]]
      identifier = "en-archives"
      name = "Archives"
      url = "/archives"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "en-search"
      name = "Search"
      url = "/search"
      weight = 40
    [[languages.en.menu.main]]
      identifier = "en-tags"
      name = "Tags"
      url = "/tags"
      weight = 50

[params]
  env = "production"
  description = "Retour complet sur un cas de licenciement, de l'avertissement à la décision de justice."
  author = "Rédaction"

  # PaperMod settings
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  # Cusdis Comments — une seule plateforme de commentaires partagée par tous les déploiements
  # (netlify, vercel, cloudflare, github-pages). Renseignez cusdisAppId une fois ;
  # cusdisHost pointe vers votre instance Cusdis (publique ou auto-hébergée).
  cusdisHost = "https://cusdis.com"
  cusdisAppId = ""

  # SEO
  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    safari_pinned_tab = "/safari-pinned-tab.svg"

  [params.label]
    text = "Dossier Licenciement"
    icon = "/apple-touch-icon.png"
    iconHeight = 35

  # Profile mode (page d'accueil)
  [params.profileMode]
    enabled = true
    title = "Le dossier de licenciement"
    subtitle = "Tous les documents, étapes et la chronologie complète — de l'avertissement à la décision de justice."
    imageUrl = "/images/cover.jpg"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Dossier Licenciement"
    [[params.profileMode.buttons]]
      name = "Lire les articles"
      url = "/posts"
    [[params.profileMode.buttons]]
      name = "Voir la chronologie"
      url = "/posts/chronologie"

  # Search
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  # Analytics (décommentez si besoin)
  # googleAnalytics = "G-XXXXXXXXXX"

  # GoatCounter — analytics respectueuses de la vie privée (gratuit, sans cookie)
  # Renseignez votre code (ex: monblog) ; laissez vide pour désactiver
  goatcounterCode = ""

# Search page outputs
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

