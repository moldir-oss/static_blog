{{- /*  Cusdis Comments Integration for PaperMod  */ -}}
{{- if site.Params.comments -}}
{{- if not .Params.disableComments -}}

<div class="post-comments">
  <hr style="margin: 2rem 0; opacity: 0.3;" />
  <h3 style="margin-bottom: 1rem;">Commentaires</h3>

  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="{{ site.Params.cusdisAppId }}"
    data-page-id="{{ .File.UniqueID }}"
    data-page-url="{{ .Permalink }}"
    data-page-title="{{ .Title }}"
    data-lang="{{ .Lang }}"
  ></div>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

  <noscript>
    <p style="color: var(--secondary); font-size: 0.9rem;">
      Veuillez activer JavaScript pour voir les commentaires.
    </p>
  </noscript>
</div>

{{- end -}}
{{- end -}}
